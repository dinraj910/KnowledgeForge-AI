name: Personal Knowledge AI CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  backend-ci:
    name: Backend CI (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Python source compiles
        run: python -m compileall backend/app

      - name: Validate FastAPI app import
        run: |
          python -c "import sys; sys.path.insert(0, 'backend'); from app.main import app; print(app.title)"

  frontend-ci:
    name: Frontend CI (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  cd-package:
    name: CD Package (Main)
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backend deploy bundle
        run: |
          mkdir -p deploy/backend
          cp -r backend/app deploy/backend/app
          cp backend/requirements.txt deploy/backend/requirements.txt
          cp backend/.env.example deploy/backend/.env.example

      - name: Upload backend bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-bundle
          path: deploy/backend

      - name: Deployment handoff note
        run: |
          echo "CI/CD package complete."
          echo "Next: add your platform deploy step (Render/Railway/Azure/AWS) using repository secrets."
